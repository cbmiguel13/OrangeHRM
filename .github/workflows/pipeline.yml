name: OrangeHRM Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v3

      - name: Configurar Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Configurar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Ejecutar pruebas
        run: mvn clean test

      - name: Guardar reporte
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: Reporte-TestNG
          path: |
            reports/
            target/surefire-reports/
